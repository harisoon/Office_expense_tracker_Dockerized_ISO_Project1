<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>{% block title %}Admin Panel{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>
  <div class="top-navbar">
    <div class="navbar-brand">
      <h2>Admin Panel - HTEC</h2>
    </div>
    <div class="navbar-nav">
      <a href="{{ url_for('main.dashboard') }}" class="nav-link">Dashboard</a>
      <a href="{{ url_for('admin.users') }}" class="nav-link">Users</a>
      <a href="{{ url_for('admin.categories') }}" class="nav-link">Categories</a>
      <a href="{{ url_for('admin.budgets') }}" class="nav-link">Budgets</a>
      <a href="{{ url_for('admin.logout') }}" class="nav-link logout-btn">Logout</a>
    </div>
  </div>

  <div class="container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div id="flash-messages">
        {% for category, msg in messages %}
          <div class="flash flash-{{ category }}">{{ msg }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}


    {% block content %}{% endblock %}
  </div>
  <!-- Include global flash-dismiss script -->
  <script src="{{ url_for('static', filename='js/flash.js') }}"></script>
</body>
</html>
