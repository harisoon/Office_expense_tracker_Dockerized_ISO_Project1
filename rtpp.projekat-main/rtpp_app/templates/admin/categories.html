{% extends 'admin/base.html' %}

{% block content %}
<div class="card">
  <h2>Category Management</h2>

  <div class="card" style="margin-bottom:1.5rem;">
    <h3>Add New Category</h3>
    <form method="POST" action="{{ url_for('admin.add_category') }}">
      <div class="form-group">
        <label>Category Name</label>
        <input type="text" name="name" required>
      </div>
      <button type="submit" class="btn-green">Add Category</button>
    </form>
  </div>

  <div class="card">
    <h3>Existing Categories</h3>
    <ul style="list-style:none; padding:0; margin:0;">
      {% for category in categories %}
      <li style="display:flex; align-items:center; justify-content:space-between; padding:0.5rem 0; border-bottom:1px solid #ddd;">

        <div>
          {{ category.name }}
        </div>


        <div style="display:flex; align-items:center; gap:1rem;">

          <span class="{{ 'status-active' if category.enabled else 'status-inactive' }}">
            {{ "Active" if category.enabled else "Inactive" }}
          </span>


          <form method="POST"
                action="{{ url_for('admin.delete_category', category_id=category.id) }}"
                onsubmit="return confirm('Are you sure you want to delete this category?');">
            <button type="submit" class="btn-red">Delete</button>
          </form>
        </div>
      </li>
      {% endfor %}
    </ul>
  </div>
</div>
{% endblock %}
