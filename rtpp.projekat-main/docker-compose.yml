services:

  postgres:
    image: postgres:17
    container_name: rtpp_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rtpp_network

  flask:
    build: .
    container_name: rtpp_flask
    restart: always
    command: flask run --host=0.0.0.0 --port=5000
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      SECRET_KEY: ${SECRET_KEY}
      FLASK_APP: ${FLASK_APP}
      FLASK_ENV: ${FLASK_ENV}
      MAIL_SERVER: ${MAIL_SERVER}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USE_TLS: ${MAIL_USE_TLS}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    volumes:
      - .:/app
    depends_on:
      - postgres
    networks:
      - rtpp_network

  nginx:
    image: nginx:alpine
    container_name: rtpp_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./rtpp_app/static:/app/rtpp_app/static
    depends_on:
      - flask
    networks:
      - rtpp_network

volumes:
  postgres_data:

networks:
  rtpp_network:
    driver: bridge